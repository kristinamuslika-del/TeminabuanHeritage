<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: black;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        #videoPlayer {
            width: 100%;
            height: 100%;
            object-fit: contain;  /* atau 'cover' jika ingin full-screen tanpa crop */
            background: black;
        }
        
        /* Opsional: sembunyikan kontrol jika ingin full tanpa kontrol */
        video::-webkit-media-controls {
            display: flex !important;
        }
    </style>
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
</head>
<body>
    <video id="videoPlayer" controls></video>
    <script>
        var url = "https://estreams.tv.nej.cz/dash/CH_TVP_SPORT_Portable.ism/playlist.mpd";
        var player = dashjs.MediaPlayer().create();
        player.initialize(document.getElementById("videoPlayer"), url, true);
        
        // Set ClearKey license
        var clearkeys = {
            "95620bdd974041409d4674ab629e22d4": "c6c226ca1689f528a6f91e86da618f64",
            "181c091002d04c5481c3faab18752843": "b081b6169351e0f4bfc40212dfeeed10",
            "1163925b6b37434198130f773bc62841": "e2bdd2b87e1ddb502eb7898daece857f"
        };
        player.setProtectionData({
            "clearkey": {
                "clearkeys": clearkeys
            }
        });
        
        // Opsional: Play otomatis
        document.getElementById("videoPlayer").play().catch(e => console.log("Auto-play ditolak browser"));
    </script>
</body>
</html>
